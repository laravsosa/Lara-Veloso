<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de peliculas</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✨ Diario de Sueños ✨</h2>
        <form id="ghibliForm">
            <label>Nombre de Película:</label>
            <select id="pelicula" required>
                <option value="">Cargando películas...</option>
            </select>
            
            <label>Escena Favorita:</label>
            <textarea id="escena" rows="5" placeholder="Describe ese momento especial..." required></textarea>

            <label>Calificación (1-5):</label>
            <input type="number" id="calificacion" min="1" max="5" placeholder="Ej: 5" required>
            
            <button type="submit">Guardar en el Bosque</button>
        </form>
        <p class="footer-note">"Nada de lo que sucede se olvida jamás, aunque no lo recuerdes".</p>
    </div>
    <div style="margin-top: 20px; display: flex; justify-content: center;">
        <iframe 
    style="border-radius:12px" 
    src="https://open.spotify.com/playlist/6ABOS16Y6EJxn7NFxWzric?si=44e50b5993f54f20" 
    width="100%" height="152" frameBorder="0" 
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>

    <script>
        
        const selectPeliculas = document.getElementById('pelicula');
        async function fetchMovies() {
            try {
                const response = await fetch('https://ghibliapi.vercel.app/films');
                const movies = await response.json();
                selectPeliculas.innerHTML = '<option value="">Selecciona una película</option>';
                movies.forEach(movie => {
                    const option = document.createElement('option');
                    option.value = movie.title;
                    option.textContent = movie.title;
                    selectPeliculas.appendChild(option);
                });
            } catch (error) {
                selectPeliculas.innerHTML = '<option value="">Error al cargar películas</option>';
            }
        }
        fetchMovies();

        
        document.getElementById('ghibliForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            
            const data = {
                nombre_pelicula: document.getElementById('pelicula').value,
                escena_favorita: document.getElementById('escena').value,
                calificacion: document.getElementById('calificacion').value
            };

            
            const WEBHOOK_URL = 'https://koolodetae.app.n8n.cloud/webhook/studio-ghibli-films'; 

            try {
                const response = await fetch(WEBHOOK_URL, {
                     method: 'POST',
                    mode: 'cors', // Forzamos el modo cors
                    headers: {'Accept': 'application/json','Content-Type': 'text/plain'},
                    body: JSON.stringify(data)
            });
                
                if (response.ok) {
                    alert('🌿 ¡Recuerdo guardado!');
                    document.getElementById('ghibliForm').reset();
                }
            } catch (error) {
                alert('Error al conectar con n8n');
            }
        });
    </script>
</body>
</html>
